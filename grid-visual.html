<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Beat Grid Visual</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #0a0a0a; color: #ccc; font-family: monospace; padding: 16px; user-select: none; }
#toolbar { display: flex; gap: 8px; align-items: center; margin-bottom: 12px; flex-wrap: wrap; }
button { font-size: 13px; padding: 8px 18px; background: #d4a64f; color: #000; border: none; cursor: pointer; border-radius: 4px; font-family: monospace; font-weight: bold; }
button:hover { background: #f0c060; }
button:disabled { background: #333; color: #666; cursor: default; }
button.sec { background: #2a4a2a; color: #0f0; }
button.sec:hover { background: #3a6a3a; }
#zoomLabel { color: #888; font-size: 12px; min-width: 80px; }
.track-wrap { margin-bottom: 6px; }
.track-label { font-size: 11px; color: #888; margin-bottom: 2px; padding-left: 4px; }
canvas { display: block; cursor: grab; border: 1px solid #222; }
canvas:active { cursor: grabbing; }
#legend { display: flex; flex-wrap: wrap; gap: 14px; font-size: 11px; margin: 10px 0; color: #666; }
.dot { display: inline-block; width: 9px; height: 9px; border-radius: 2px; margin-right: 3px; vertical-align: middle; }
#info { background: #111; padding: 10px; font-size: 11px; color: #0f0; line-height: 1.8; white-space: pre-wrap; margin-top: 8px; border-radius: 4px; min-height: 40px; }
</style>
</head>
<body>

<div id="toolbar">
  <button id="loadBtn">⬇ LOAD 2 TRACKS</button>
  <button id="playBtn" class="sec" disabled>▶ PLAY</button>
  <button id="snapBtn" class="sec" disabled>⊕ SNAP</button>
  <button id="zoomIn">＋ ZOOM</button>
  <button id="zoomOut">－ ZOOM</button>
  <span id="zoomLabel">zoom: 1×</span>
</div>

<div id="legend">
  <span><span class="dot" style="background:#0f0"></span>Bar 1 anchor</span>
  <span><span class="dot" style="background:#ff0"></span>Bar 32</span>
  <span><span class="dot" style="background:#f80"></span>Bar 64</span>
  <span><span class="dot" style="background:#f55"></span>Xfade</span>
  <span><span class="dot" style="background:#444"></span>Bars</span>
  <span style="color:#888">Scroll = pan  •  +/- = zoom</span>
</div>

<div class="track-wrap">
  <div class="track-label" id="lblA">Track A — not loaded</div>
  <canvas id="cA" height="90"></canvas>
</div>
<div class="track-wrap">
  <div class="track-label" id="lblB">Track B — not loaded</div>
  <canvas id="cB" height="90"></canvas>
</div>

<div id="info">Load two tracks to see their beat grids.</div>

<script>
const BARS_PLAY  = 16
const BARS_XFADE = 8

let tracks     = [null, null]   // { name, bpm, gridOffsetSec, barDurationSec, url }
let audioBufs  = [null, null]
let masterBpm  = null
let pxPerSec   = 80             // zoom level
let viewOffset = 0              // seconds — left edge of view
let dragging   = false
let dragStartX = 0, dragStartOff = 0
let actx       = null

const canvases = ['cA','cB'].map(id => document.getElementById(id))
const W = () => canvases[0].parentElement.clientWidth - 2

function realBarDur() { return masterBpm ? (60 / masterBpm) * 4 : 2 }

// x position for a time in seconds
function xOf(sec) { return (sec - viewOffset) * pxPerSec }
// time for an x position
function secOf(x)  { return x / pxPerSec + viewOffset }

function drawAll() {
  canvases.forEach((canvas, i) => {
    canvas.width  = W()
    canvas.height = 90
    if (!tracks[i]) return
    drawTrack(canvas, tracks[i], i)
  })
}

function drawTrack(canvas, track, idx) {
  const ctx = canvas.getContext('2d')
  const W   = canvas.width
  const H   = canvas.height
  const rate    = masterBpm / track.bpm
  const bar1    = track.gridOffsetSec * rate   // bar 1 real-time position
  const bd      = realBarDur()

  ctx.fillStyle = '#0d0d0d'
  ctx.fillRect(0, 0, W, H)

  // Shade measured region (bars 32–64)
  const x32 = xOf(bar1 + 31 * bd)
  const x64 = xOf(bar1 + 63 * bd)
  if (x64 > 0 && x32 < W) {
    ctx.fillStyle = '#1a1600'
    ctx.fillRect(Math.max(0,x32), 0, Math.min(W,x64)-Math.max(0,x32), H)
  }

  // Shade xfade zone
  const xXF  = xOf(bar1 + BARS_PLAY * bd)
  const xXFE = xOf(bar1 + (BARS_PLAY + BARS_XFADE) * bd)
  if (xXFE > 0 && xXF < W) {
    ctx.fillStyle = '#1a0505'
    ctx.fillRect(Math.max(0,xXF), 0, Math.min(W,xXFE)-Math.max(0,xXF), H)
  }

  // Beat lines
  const firstVisBar = Math.max(1, Math.floor((viewOffset - bar1) / bd))
  const lastVisBar  = Math.ceil((viewOffset + W/pxPerSec - bar1) / bd) + 2

  for (let b = firstVisBar; b <= lastVisBar; b++) {
    const barSec = bar1 + (b - 1) * bd
    // beats within bar
    for (let beat = 1; beat < 4; beat++) {
      const x = xOf(barSec + beat * bd / 4)
      if (x < 0 || x > W) continue
      ctx.strokeStyle = '#1e1e1e'; ctx.lineWidth = 1
      ctx.beginPath(); ctx.moveTo(x, H * 0.55); ctx.lineTo(x, H); ctx.stroke()
    }
    // bar line
    const x = xOf(barSec)
    if (x < -2 || x > W + 2) continue
    const isKey = b === 32 || b === 64 || b === 1 || b === BARS_PLAY + 1
    ctx.strokeStyle = isKey ? '#555' : '#2a2a2a'
    ctx.lineWidth   = isKey ? 1 : 1
    ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke()
    // bar number (every 4 bars, or key bars)
    if ((b % 4 === 1 || isKey) && x > 2 && x < W - 10) {
      ctx.fillStyle = '#444'; ctx.font = '9px monospace'
      ctx.fillText(b, x + 2, H - 3)
    }
  }

  // Bar 32 — yellow
  if (x32 > 0 && x32 < W) {
    ctx.strokeStyle = '#dd0'; ctx.lineWidth = 2
    ctx.beginPath(); ctx.moveTo(x32, 0); ctx.lineTo(x32, H); ctx.stroke()
    ctx.fillStyle = '#dd0'; ctx.font = 'bold 11px monospace'
    ctx.fillText('32', x32 + 3, 13)
  }

  // Bar 64 — orange
  if (x64 > 0 && x64 < W) {
    ctx.strokeStyle = '#f80'; ctx.lineWidth = 2
    ctx.beginPath(); ctx.moveTo(x64, 0); ctx.lineTo(x64, H); ctx.stroke()
    ctx.fillStyle = '#f80'; ctx.font = 'bold 11px monospace'
    ctx.fillText('64', x64 + 3, 13)
  }

  // Measured span label
  if (x32 > 0 && x64 < W && x64 - x32 > 80) {
    ctx.fillStyle = '#aa0'; ctx.font = '9px monospace'
    ctx.fillText('← measured 32 bars →', (x32+x64)/2 - 55, 24)
  }

  // Xfade
  if (xXF > 0 && xXF < W) {
    ctx.strokeStyle = '#f55'; ctx.lineWidth = 2
    ctx.beginPath(); ctx.moveTo(xXF, 0); ctx.lineTo(xXF, H); ctx.stroke()
    ctx.fillStyle = '#f55'; ctx.font = 'bold 10px monospace'
    ctx.fillText('XFADE', xXF + 3, H - 6)
  }

  // Bar 1 — bright green, thick
  const x1 = xOf(bar1)
  if (x1 > -4 && x1 < W + 4) {
    ctx.strokeStyle = '#0f0'; ctx.lineWidth = 3
    ctx.beginPath(); ctx.moveTo(x1, 0); ctx.lineTo(x1, H); ctx.stroke()
    ctx.fillStyle = '#0f0'; ctx.font = 'bold 13px monospace'
    ctx.fillText('1', x1 + 4, H - 5)
  }

  // Extrapolation arrow if bar 1 is visible and to the left of bar 32
  if (x1 >= 0 && x32 > x1 && x32 < W) {
    ctx.strokeStyle = '#0f06'; ctx.lineWidth = 1; ctx.setLineDash([3,3])
    ctx.beginPath(); ctx.moveTo(x32, H-14); ctx.lineTo(x1+2, H-14); ctx.stroke()
    ctx.setLineDash([])
  }

  // Bottom info
  ctx.fillStyle = '#444'; ctx.font = '9px monospace'
  ctx.fillText(`${track.bpm.toFixed(2)}bpm  rate×${rate.toFixed(4)}  bar1@${bar1.toFixed(3)}s  barDur=${bd.toFixed(4)}s`, 4, H - 4)
}

function updateInfo() {
  if (!tracks[0] || !tracks[1]) return
  const A = tracks[0], B = tracks[1]
  const bd = realBarDur()
  const rA = masterBpm / A.bpm, rB = masterBpm / B.bpm
  const bar1A = A.gridOffsetSec * rA
  const bar1B = B.gridOffsetSec * rB
  const xfadeAt = bar1A + BARS_PLAY * bd
  document.getElementById('info').textContent =
`A: ${A.name.replace('.wav','')}
   BPM ${A.bpm.toFixed(3)}  bar1 @ ${bar1A.toFixed(4)}s  xfade fires @ ${xfadeAt.toFixed(4)}s (bar ${BARS_PLAY+1})
B: ${B.name.replace('.wav','')}
   BPM ${B.bpm.toFixed(3)}  rate ×${rB.toFixed(5)}  bar1 starts AT xfade = ${xfadeAt.toFixed(4)}s
   source.start(${xfadeAt.toFixed(3)}, ${B.gridOffsetSec.toFixed(5)})
Drift = 0ms by construction — zoom in on green lines to verify visually`
}

// LOAD
document.getElementById('loadBtn').addEventListener('click', async () => {
  const btn = document.getElementById('loadBtn')
  btn.disabled = true
  document.getElementById('info').textContent = 'Fetching playlist...'
  try {
    const playlist = await (await fetch('/api/playlist/tech-house')).json()
    const analyzed = playlist.filter(t => t.barDurationSec)
    tracks[0] = analyzed[0]
    tracks[1] = analyzed[1]
    masterBpm = tracks[0].bpm
    document.getElementById('lblA').textContent =
      `Track A — ${tracks[0].name.replace('.wav','')}  (${tracks[0].bpm.toFixed(2)} BPM)`
    document.getElementById('lblB').textContent =
      `Track B — ${tracks[1].name.replace('.wav','')}  (${tracks[1].bpm.toFixed(2)} BPM  →  rate ×${(masterBpm/tracks[1].bpm).toFixed(4)})`
    viewOffset = 0
    drawAll()
    updateInfo()
    document.getElementById('playBtn').disabled = false
    document.getElementById('snapBtn').disabled = false
    btn.textContent = '↺ RELOAD'
  } catch(e) {
    document.getElementById('info').textContent = 'ERROR: ' + e.message
  }
  btn.disabled = false
})

// ZOOM
document.getElementById('zoomIn').addEventListener('click', () => {
  pxPerSec = Math.min(pxPerSec * 2, 3200)
  document.getElementById('zoomLabel').textContent = `zoom: ${(pxPerSec/80).toFixed(0)}×`
  drawAll()
})
document.getElementById('zoomOut').addEventListener('click', () => {
  pxPerSec = Math.max(pxPerSec / 2, 5)
  document.getElementById('zoomLabel').textContent = `zoom: ${(pxPerSec/80).toFixed(0)}×`
  drawAll()
})

// Mouse wheel zoom
canvases.forEach(canvas => {
  canvas.addEventListener('wheel', e => {
    e.preventDefault()
    const rect   = canvas.getBoundingClientRect()
    const mouseX = e.clientX - rect.left
    const timeSec = secOf(mouseX)   // time under cursor
    pxPerSec = e.deltaY < 0
      ? Math.min(pxPerSec * 1.3, 6400)
      : Math.max(pxPerSec / 1.3, 5)
    // Keep time under cursor fixed
    viewOffset = timeSec - mouseX / pxPerSec
    viewOffset = Math.max(0, viewOffset)
    document.getElementById('zoomLabel').textContent = `zoom: ${(pxPerSec/80).toFixed(1)}×`
    drawAll()
  }, { passive: false })

  canvas.addEventListener('mousedown', e => {
    dragging = true; dragStartX = e.clientX; dragStartOff = viewOffset
  })
  window.addEventListener('mousemove', e => {
    if (!dragging) return
    const dx = e.clientX - dragStartX
    viewOffset = Math.max(0, dragStartOff - dx / pxPerSec)
    drawAll()
  })
  window.addEventListener('mouseup', () => { dragging = false })
})

// PLAY — loads a few seconds around bar 1 and plays it
document.getElementById('playBtn').addEventListener('click', async () => {
  if (!tracks[0]) return
  try {
    if (!actx) actx = new AudioContext({ sampleRate: 44100 })
    await actx.resume()
    const btn = document.getElementById('playBtn')
    btn.disabled = true; btn.textContent = '⏳'

    const A = tracks[0]
    const rA = masterBpm / A.bpm
    const bar1 = A.gridOffsetSec * rA
    const bd   = realBarDur()
    // Fetch 8 bars starting from bar 1 (or file start if bar1 < 0)
    const startSec  = Math.max(0, A.gridOffsetSec - 0.2)
    const endSec    = A.gridOffsetSec + 8 * (bd * A.bpm / masterBpm)   // buffer time
    const sr        = 48000, ch = 2, bps = 2                            // 16-bit stereo 48k
    const byteStart = 44 + Math.floor(startSec * sr * ch * bps)
    const byteEnd   = 44 + Math.ceil(endSec   * sr * ch * bps)
    const resp = await fetch(A.url, {
      headers: { Range: `bytes=${byteStart}-${byteEnd}` }
    })
    const ab   = await resp.arrayBuffer()
    // Prepend a minimal WAV header so decodeAudioData works
    const pcm  = new Uint8Array(ab)
    const full = buildWav(pcm, sr, ch, bps)
    const buf  = await actx.decodeAudioData(full.buffer)
    const src  = actx.createBufferSource()
    src.buffer = buf
    src.playbackRate.value = masterBpm / A.bpm
    src.connect(actx.destination)
    src.start()
    src.onended = () => { btn.disabled = false; btn.textContent = '▶ PLAY' }
  } catch(e) {
    console.error(e)
    document.getElementById('playBtn').disabled = false
    document.getElementById('playBtn').textContent = '▶ PLAY'
  }
})

function buildWav(pcm, sr, ch, bps) {
  const dataLen = pcm.length
  const buf = new ArrayBuffer(44 + dataLen)
  const view = new DataView(buf)
  const enc = s => { for(let i=0;i<s.length;i++) view.setUint8(36+i, s.charCodeAt(i)) }
  // RIFF
  ;[...'RIFF'].forEach((c,i)=>view.setUint8(i,c.charCodeAt(0)))
  view.setUint32(4, 36 + dataLen, true)
  ;[...'WAVE'].forEach((c,i)=>view.setUint8(8+i,c.charCodeAt(0)))
  ;[...'fmt '].forEach((c,i)=>view.setUint8(12+i,c.charCodeAt(0)))
  view.setUint32(16, 16, true)
  view.setUint16(20, 1, true)      // PCM
  view.setUint16(22, ch, true)
  view.setUint32(24, sr, true)
  view.setUint32(28, sr * ch * bps, true)
  view.setUint16(32, ch * bps, true)
  view.setUint16(34, bps * 8, true)
  ;[...'data'].forEach((c,i)=>view.setUint8(36+i,c.charCodeAt(0)))
  view.setUint32(40, dataLen, true)
  new Uint8Array(buf).set(pcm, 44)
  return new Uint8Array(buf)
}

// SNAP — zoom to bar 1 region
document.getElementById('snapBtn').addEventListener('click', () => {
  if (!tracks[0]) return
  const A   = tracks[0]
  const rA  = masterBpm / A.bpm
  const bar1 = A.gridOffsetSec * rA
  // Jump view to bar 1 and zoom in tight
  pxPerSec = 800
  viewOffset = Math.max(0, bar1 - 0.5)
  document.getElementById('zoomLabel').textContent = `zoom: ${(pxPerSec/80).toFixed(0)}×`
  drawAll()
})

window.addEventListener('resize', drawAll)
</script>
</body>
</html>
