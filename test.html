<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>ShadyRadio Mix Test</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: monospace; background: #000; color: #d4a64f; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; gap: 20px; padding: 20px; }
    h1 { color: #fff; letter-spacing: 4px; font-size: 20px; }
    select { font-size: 16px; padding: 10px 16px; background: #111; color: #d4a64f; border: 1px solid #d4a64f; border-radius: 4px; font-family: monospace; }
    #startBtn { font-size: 26px; padding: 18px 60px; background: #d4a64f; color: #000; border: none; cursor: pointer; border-radius: 6px; font-family: monospace; font-weight: bold; }
    #startBtn:hover { background: #f0c060; }
    #startBtn:disabled { background: #333; color: #666; cursor: default; }
    #info { font-size: 15px; color: #aaa; text-align: center; line-height: 2.2; min-height: 130px; }
    .track { color: #fff; font-size: 17px; }
    .bpm { color: #d4a64f; }
    .bars { color: #0ff; }
    .mixing { color: #f55; font-size: 18px; font-weight: bold; }
    .loading { color: #888; }
    #vu { display: flex; gap: 3px; align-items: flex-end; height: 50px; }
    .vb { width: 14px; background: #1a1a1a; height: 100%; position: relative; border-radius: 2px; overflow: hidden; }
    .vf { position: absolute; bottom: 0; width: 100%; background: linear-gradient(to top, #0f0 0%, #ff0 60%, #f00 100%); transition: height 0.05s; height: 0%; }
    #grid { font-size: 11px; color: #444; margin-top: 4px; }
  </style>
</head>
<body>
  <h1>SHADYRADIO</h1>
  <select id="genreSelect">
    <option value="tech-house">Tech House (31 tracks)</option>
    <option value="jackin-house">Jackin House (57 tracks)</option>
    <option value="house">House</option>
    <option value="afro-house">Afro House</option>
    <option value="deep-house">Deep House</option>
  </select>
  <button id="startBtn">▶ START MIX</button>
  <div id="info">Pick a genre and hit START.</div>
  <div id="vu"></div>
  <div id="grid"></div>

<script>
const AUDIO_SERVER = ''  // proxied through Vite — same origin, no CORS
const BARS_PLAY  = 16   // bars to play before crossfade
const BARS_XFADE = 8    // crossfade length in bars
const XFADE_STEPS = 50

let ctx, worklet, running = false
let playlist = [], idx = 0
let activeCh = 0
let sources = [null, null]
let meterVals = new Float32Array(20)
let barCount = 0, barTimer = null, vuRaf = null
let masterBpm = null   // locked to first track; all others pitch-shift to match

const infoEl   = document.getElementById('info')
const startBtn = document.getElementById('startBtn')
const vuEl     = document.getElementById('vu')
const gridEl   = document.getElementById('grid')

for (let i = 0; i < 16; i++) {
  const b = document.createElement('div'); b.className = 'vb'
  const f = document.createElement('div'); f.className = 'vf'
  b.appendChild(f); vuEl.appendChild(b)
}

// Drift-corrected wait — wakes up within ~4ms of target AudioContext time
function waitUntil(t) {
  return new Promise(r => {
    function check() {
      const ms = (t - ctx.currentTime) * 1000
      if (ms <= 6) return r()
      setTimeout(check, Math.max(4, ms - 6))
    }
    check()
  })
}

function cleanName(n) {
  return n.replace(/\.wav$/i,'').replace(/^\d+[A-Za-z#]+\s*[-–]\s*/,'').trim()
}

function showInfo(track, bpm, mixing, intoName) {
  const name = cleanName(track.name)
  const rate = (masterBpm && bpm) ? (masterBpm / bpm).toFixed(3) : '1.000'
  infoEl.innerHTML = `
    <div class="track">${name}</div>
    <div class="bpm">♩ ${bpm.toFixed(1)} BPM  (rate ${rate}×)</div>
    <div class="bars" id="bardisp">Bar ${barCount}</div>
    ${mixing
      ? `<div class="mixing">→ ${intoName}</div>`
      : `<div class="loading">next loading...</div>`}
  `
}

function startBarClock(barDurationSec) {
  clearInterval(barTimer); barCount = 1
  barTimer = setInterval(() => {
    barCount++
    const el = document.getElementById('bardisp')
    if (el) el.textContent = `Bar ${barCount}`
  }, barDurationSec * 1000)
}

// when     = AudioContext scheduled start time (default: now)
// offset   = buffer seek in seconds (places bar 1 of track at `when`)
// trackBpm = source BPM, adjusted to masterBpm via playbackRate
function playBuffer(buffer, ch, gain, when, offset, trackBpm) {
  if (sources[ch]) { try { sources[ch].stop() } catch(e) {} sources[ch].disconnect() }
  const src = ctx.createBufferSource()
  src.buffer = buffer
  // Tempo-lock: pitch up/down to match master BPM (VDJ-style beat matching)
  if (masterBpm && trackBpm && Math.abs(masterBpm - trackBpm) > 0.05) {
    src.playbackRate.value = masterBpm / trackBpm
  }
  src.connect(worklet, 0, ch)
  sources[ch] = src
  worklet.port.postMessage({ type: 'set-active', channel: ch, value: 1 })
  worklet.port.postMessage({ type: 'set-gain',   channel: ch, value: gain })
  const t = when ?? ctx.currentTime
  src.start(t, Math.max(0, offset ?? 0))
  return t
}

function fadeChannel(ch, from, to, durationMs) {
  const step = durationMs / XFADE_STEPS
  for (let i = 0; i <= XFADE_STEPS; i++) {
    setTimeout(() => {
      if (!running) return
      const g = from + (to - from) * (1 - Math.cos((i / XFADE_STEPS) * Math.PI)) / 2
      worklet.port.postMessage({ type: 'set-gain', channel: ch, value: g })
    }, i * step)
  }
}

function stopCh(ch) {
  if (sources[ch]) { try { sources[ch].stop() } catch(e) {} sources[ch].disconnect(); sources[ch] = null }
  worklet.port.postMessage({ type: 'set-active', channel: ch, value: 0 })
  worklet.port.postMessage({ type: 'set-gain',   channel: ch, value: 0 })
}

function startVU() {
  const fills = vuEl.querySelectorAll('.vf')
  const tick = () => {
    if (!running) return
    for (let i = 0; i < 16; i++)
      fills[i].style.height = Math.min(100, (meterVals[i] || 0) * 400) + '%'
    vuRaf = requestAnimationFrame(tick)
  }
  tick()
}

async function fetchDecode(url) {
  const r = await fetch(url)
  if (!r.ok) throw new Error(`HTTP ${r.status}: ${url}`)
  return ctx.decodeAudioData(await r.arrayBuffer())
}

async function startMix() {
  running = true
  startBtn.disabled = true
  const genre = document.getElementById('genreSelect').value
  infoEl.innerHTML = '<div class="loading">Initializing DSP...</div>'

  ctx = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: 44100 })
  await ctx.resume()
  await ctx.audioWorklet.addModule('/audio/engine.worklet.js')
  worklet = new AudioWorkletNode(ctx, 'sf-engine', {
    numberOfInputs: 16, numberOfOutputs: 1, outputChannelCount: [2]
  })
  worklet.connect(ctx.destination)
  worklet.port.onmessage = e => {
    if (e.data.type === 'meter') meterVals = e.data.values
  }

  infoEl.innerHTML = '<div class="loading">Loading WASM DSP...</div>'
  const wasmBuf = await (await fetch('/dsp/engine.wasm')).arrayBuffer()
  await new Promise((res, rej) => {
    const t = setTimeout(() => rej(new Error('WASM timeout')), 8000)
    const orig = worklet.port.onmessage
    worklet.port.onmessage = e => {
      orig(e)
      if (e.data.type === 'ready') { clearTimeout(t); res() }
      if (e.data.type === 'error') { clearTimeout(t); rej(new Error(e.data.message)) }
    }
    worklet.port.postMessage({ type: 'init-wasm', buffer: wasmBuf })
  })

  infoEl.innerHTML = `<div class="loading">Fetching ${genre} playlist...</div>`
  const all = await (await fetch(`${AUDIO_SERVER}/api/playlist/${genre}`)).json()
  // Only use tracks with real v6 beat grid data
  const analyzed = all.filter(t => t.barDurationSec && t.barDurationSec > 0)
  if (analyzed.length === 0) throw new Error('No analyzed tracks found in this genre')
  playlist = analyzed.sort(() => Math.random() - 0.5)
  idx = 0

  // Master BPM = first track — all others adjust playbackRate to match
  masterBpm = playlist[0].bpm
  gridEl.textContent = `master: ${masterBpm.toFixed(1)} BPM  |  ${analyzed.length} tracks with beat grid`

  infoEl.innerHTML = `<div class="loading">Loading first track...</div>`
  let curBuf = await fetchDecode(playlist[0].url)

  activeCh = 0
  const firstStart = playBuffer(curBuf, activeCh, 1.0, null, playlist[0].gridOffsetSec, playlist[0].bpm)
  startBarClock(playlist[0].barDurationSec)
  startVU()

  async function nextCycle(trackStartTime) {
    if (!running) return
    const cur  = playlist[idx]
    const next = playlist[(idx + 1) % playlist.length]
    const bpm  = cur.bpm

    // masterBpm bar duration (all tracks play at this rate due to playbackRate)
    const barDur   = (60 / masterBpm) * 4
    const xfadeAt  = trackStartTime + BARS_PLAY * barDur
    const xfadeDur = BARS_XFADE * barDur

    showInfo(cur, bpm, false, '')

    // Load next track in background
    let nextBuf
    const load = fetchDecode(next.url).then(b => { nextBuf = b }).catch(e => console.error(e))

    await waitUntil(xfadeAt)
    if (!running) return

    showInfo(cur, bpm, true, cleanName(next.name))
    await load
    if (!nextBuf || !running) { idx = (idx + 1) % playlist.length; return nextCycle(ctx.currentTime) }

    const xfadeCh = activeCh === 0 ? 1 : 0
    // Start incoming track at the crossfade bar, seeked to its grid offset
    // so its bar 1 lands exactly on the master bar boundary
    const nextStart = playBuffer(nextBuf, xfadeCh, 0.0, xfadeAt, next.gridOffsetSec, next.bpm)

    fadeChannel(activeCh,  1.0, 0.0, xfadeDur * 1000)
    fadeChannel(xfadeCh,   0.0, 1.0, xfadeDur * 1000)

    await waitUntil(xfadeAt + xfadeDur)
    if (!running) return

    stopCh(activeCh)
    activeCh = xfadeCh
    idx = (idx + 1) % playlist.length
    startBarClock(barDur)
    nextCycle(nextStart)
  }

  nextCycle(firstStart)
}

startBtn.addEventListener('click', () => {
  startMix().catch(e => {
    infoEl.innerHTML = `<div style="color:#f55">ERROR: ${e.message}</div>`
    console.error(e); startBtn.disabled = false; running = false
  })
})
</script>
</body>
</html>
